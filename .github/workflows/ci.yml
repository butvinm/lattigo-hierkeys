name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch: # manual run from Actions UI (pick a branch to run full suite)

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: build examples
        working-directory: example
        run: go build ./...

      # PR path: -short only. Race scoped to concurrent test (the only code
      # path that spawns goroutines). -skip avoids running the concurrent
      # test twice.
      - name: test (short, skip concurrent)
        if: github.event_name == 'pull_request'
        run: go test -short -count=1 -skip TestDeriveGaloisKeysConcurrent ./...

      - name: test (concurrent with race, short)
        if: github.event_name == 'pull_request'
        run: go test -race -short -count=1 -run TestDeriveGaloisKeysConcurrent ./...

      # Full path: master push OR manual dispatch on a PR branch (run before
      # merge via "Run workflow" in the Actions UI).
      - name: test (full, skip concurrent)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: go test -count=1 -skip TestDeriveGaloisKeysConcurrent ./...

      - name: test (concurrent with race, full)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: go test -race -count=1 -run TestDeriveGaloisKeysConcurrent ./...
