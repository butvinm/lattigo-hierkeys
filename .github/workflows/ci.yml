name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: build examples
        working-directory: example
        run: go build ./...

      - name: test (short, race)
        run: go test -race -short -count=1 ./...

      - name: test (full, master only)
        if: github.ref == 'refs/heads/master'
        run: go test -count=1 ./...
